<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>小学英语大冒险 · 期末闯关岛</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖动文字，更卡通友好 */
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(145deg, #ffefdc 0%, #ffe6f0 40%, #e0f7ff 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 卡通漂浮物 + 可爱动物 */
        .bg-decor {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0.2;
            font-size: 3rem;
            animation: float 7s infinite ease-in-out;
        }
        .bg-decor.d1 { top: 8%; left: 2%; animation-duration: 6s; }
        .bg-decor.d2 { top: 20%; right: 3%; animation-duration: 8s; animation-delay: 1s; }
        .bg-decor.d3 { bottom: 15%; left: 5%; animation-duration: 9s; animation-delay: 0.5s; }
        .bg-decor.d4 { bottom: 25%; right: 6%; animation-duration: 7s; }
        .bg-decor.d5 { top: 45%; left: 1%; animation-duration: 10s; }
        .bg-decor.d6 { top: 70%; right: 2%; animation-duration: 5.5s; }
        .bg-decor.unicorn { top: 12%; left: 85%; font-size: 3rem; opacity: 0.25; animation: float 12s infinite; }
        .bg-decor.bear { bottom: 8%; right: 88%; font-size: 2.8rem; opacity: 0.2; animation: float 8s infinite 2s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(6deg); }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 250, 240, 0.92);
            backdrop-filter: blur(8px);
            padding: 25px 30px 35px;
            border-radius: 65px;
            box-shadow: 0 20px 40px rgba(255, 120, 160, 0.25), 0 8px 20px rgba(0,0,0,0.1);
            position: relative;
            z-index: 2;
            border: 4px solid #fff9;
            transition: all 0.2s;
        }
        /* 可爱小爪子装饰 */
        .container::before {
            content: "🐾🐾🐾";
            position: absolute;
            bottom: -15px;
            left: 20px;
            font-size: 24px;
            opacity: 0.4;
            pointer-events: none;
        }
        .container::after {
            content: "⭐✨⭐";
            position: absolute;
            top: -20px;
            right: 25px;
            font-size: 28px;
            opacity: 0.5;
            pointer-events: none;
        }

        .title {
            text-align: center;
            font-family: 'Fredoka One', cursive;
            font-size: 38px;
            background: linear-gradient(135deg, #FF7B9C, #B06AB3, #4D9DE0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 4px 4px 12px rgba(255,200,220,0.6);
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        .title span {
            display: inline-block;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-5px);}
        }

        .progress-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin: 20px 0 15px;
            background: #fff3e6;
            padding: 12px 20px;
            border-radius: 100px;
            box-shadow: inset 0 1px 4px #ffd0b5, 0 5px 12px rgba(0,0,0,0.05);
        }
        .progress-dot {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 20px;
            font-family: 'Fredoka One', cursive;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 5px 0 rgba(0,0,0,0.1);
        }
        .progress-dot.inactive {
            background: #e9c7b0;
            color: #8b6b4f;
            transform: scale(0.9);
        }
        .progress-dot.active {
            background: radial-gradient(circle at 30% 30%, #FFB347, #FF6B6B);
            color: white;
            transform: scale(1.2);
            box-shadow: 0 0 0 4px #FFF2CF, 0 6px 18px #ff8a5c;
            animation: popGlow 1.2s infinite alternate;
        }
        .progress-dot.completed {
            background: linear-gradient(135deg, #8ce0b0, #48c78e);
            color: #1e3a2f;
            box-shadow: 0 2px 8px #a5f0c0;
        }
        @keyframes popGlow {
            0% { box-shadow: 0 0 0 2px #fff3bf, 0 6px 12px #ff8a5c; }
            100% { box-shadow: 0 0 0 6px #fff0b5, 0 8px 18px #ffaa70; }
        }
        .progress-connector {
            width: 45px;
            height: 6px;
            background: #f7cfb0;
            border-radius: 10px;
            transition: all 0.4s;
        }
        .progress-connector.done {
            background: linear-gradient(90deg, #6ad4a0, #f6b05c);
        }

        .level-info {
            text-align: center;
            font-size: 24px;
            background: rgba(255,245,220,0.7);
            display: inline-block;
            width: auto;
            margin: 0 auto 10px;
            padding: 8px 25px;
            border-radius: 60px;
            color: #b25d8e;
            font-weight: 800;
            font-family: 'Fredoka One', cursive;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 12px #ffdbbe;
        }

        .score {
            text-align: center;
            font-size: 26px;
            background: #ffefcf;
            color: #d97a3c;
            margin: 12px auto;
            width: fit-content;
            padding: 5px 24px;
            border-radius: 50px;
            font-weight: 800;
            border: 2px solid #ffe1b3;
            box-shadow: inset 0 1px 3px #ffe5b1, 0 6px 12px rgba(0,0,0,0.05);
        }

        .level {
            display: none;
            margin: 20px 0 15px;
            padding: 20px 18px;
            border-radius: 48px;
            background: rgba(255, 240, 230, 0.75);
            border: 3px solid #ffdcb5;
            transition: 0.2s;
        }
        .level.active {
            display: block;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .level-title {
            text-align: center;
            font-size: 28px;
            color: #e6854b;
            margin-bottom: 20px;
            font-family: 'Fredoka One', cursive;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        /* 气泡配对区 */
        .bubble-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        .bubble {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 800;
            color: #2e2c2a;
            cursor: pointer;
            text-align: center;
            padding: 10px;
            transition: all 0.25s cubic-bezier(0.34, 1.2, 0.64, 1);
            background: radial-gradient(circle at 35% 30%, #fff2d7, #ffe2c4);
            box-shadow: 0 12px 15px -5px rgba(0,0,0,0.2);
            border: 2px solid white;
        }
        .bubble.eng { background: radial-gradient(circle at 35% 30%, #ffc8dd, #ffafcc); color: #9b4b6e; }
        .bubble.chn { background: radial-gradient(circle at 35% 30%, #bde0fe, #a2d2ff); color: #2f5d7a; }
        .bubble:hover:not(.matched) { transform: scale(1.08) rotate(2deg); cursor: pointer; }
        .bubble.selected { transform: scale(1.2); box-shadow: 0 0 0 5px #ffe484, 0 15px 25px #ffbd71; }
        .bubble.matched {
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        /* 第二关 分类可爱风 */
        .category-box {
            display: flex;
            gap: 18px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .category {
            flex: 1;
            padding: 15px;
            border-radius: 40px;
            min-height: 260px;
            background: #fffbee;
            border: 3px dashed #ffb882;
            transition: 0.2s;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }
        .category h3 {
            font-size: 26px;
            font-family: 'Fredoka One', cursive;
            text-align: center;
            background: #fff0db;
            border-radius: 60px;
            padding: 5px;
            margin-bottom: 12px;
            color: #cc7b3a;
        }
        .word-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            padding: 18px;
            background: #fff8ea;
            border-radius: 50px;
            margin-bottom: 10px;
            border: 2px solid #f9dbbd;
        }
        .drag-item {
            padding: 10px 18px;
            background: #ffe3b8;
            border-radius: 40px;
            font-weight: 800;
            font-size: 1rem;
            color: #b45f2b;
            cursor: grab;
            box-shadow: 0 5px 0 #ca996e;
            transition: 0.1s linear;
            border: 1px solid #ffdbb5;
        }
        .drag-item:active { cursor: grabbing; }
        .drag-item.dragging { opacity: 0.4; }
        .category .drag-item {
            background: #c9e9dc;
            box-shadow: 0 2px 5px #b1c5b9;
            cursor: default;
            border-color: #88cfb2;
        }

        /* 问答星星区 */
        .quiz-area {
            text-align: center;
        }
        .card-display {
            background: #fff9f0;
            border-radius: 70px;
            padding: 30px 20px;
            border: 4px solid #ffce9e;
            box-shadow: 0 20px 25px -12px #ffcb9e;
        }
        .card-question {
            font-size: 32px;
            font-weight: 800;
            background: #fffaec;
            display: inline-block;
            padding: 12px 28px;
            border-radius: 60px;
            color: #e37b3a;
        }
        .card-tip {
            font-size: 20px;
            background: #fef2dd;
            border-radius: 50px;
            padding: 12px 24px;
            display: inline-block;
            margin: 15px 0;
            color: #c55a2a;
            font-weight: 700;
        }
        .stars-area {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin: 25px 0 5px;
        }
        .star-btn {
            font-size: 56px;
            background: transparent;
            border: none;
            filter: grayscale(0.7);
            opacity: 0.5;
            transition: all 0.2s;
            cursor: pointer;
        }
        .star-btn.lit {
            filter: grayscale(0);
            opacity: 1;
            transform: scale(1.15);
            text-shadow: 0 0 12px #ffc107;
        }
        .star-btn:hover { transform: scale(1.2); filter: grayscale(0); opacity: 0.9;}

        /* 按钮 */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin: 20px 0 10px;
        }
        .nav-btn {
            padding: 14px 30px;
            border: none;
            border-radius: 50px;
            font-weight: 800;
            font-size: 18px;
            background: #fbc490;
            color: #6a3e1a;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 0 #c2783a;
            font-family: 'Fredoka One', cursive;
        }
        .nav-btn:active { transform: translateY(2px); box-shadow: 0 3px 0 #c2783a; }
        .nav-btn:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }
        .nav-btn.next { background: #ffa559; color: white; box-shadow: 0 6px 0 #c95f1e;}

        /* 成就弹窗 */
        .achievement-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .achievement-overlay.show { display: flex; }
        .achievement-card {
            background: #fffaf2;
            border-radius: 70px;
            padding: 35px;
            text-align: center;
            border: 4px solid #ffdbb5;
            max-width: 380px;
        }
        .achievement-icon { font-size: 70px; margin: 5px; }
        .achievement-text { font-size: 32px; font-family: 'Fredoka One', cursive; color: #cf6f2e;}

        .finish-box {
            text-align: center;
            display: none;
            background: #fff9e8;
            border-radius: 70px;
            padding: 30px;
            margin: 20px 0;
        }
        .finish-box.show { display: block; animation: bounceIn 0.5s; }
        .finish-score { font-size: 54px; color: #f5a64b; font-family: 'Fredoka One', cursive; }
        .restart-btn {
            background: #81b64c;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            box-shadow: 0 5px 0 #4f6e2c;
            cursor: pointer;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.7); opacity: 0; }
            80% { transform: scale(1.03); }
            100% { transform: scale(1); opacity: 1; }
        }
        .lock-tip {
            font-size: 14px;
            background: #ffd966;
            border-radius: 30px;
            padding: 4px 12px;
            margin-left: 10px;
        }
        @media (max-width: 680px) {
            .bubble { width: 100px; height: 100px; font-size: 14px; }
            .category-box { flex-direction: column; }
            .card-question { font-size: 24px; }
        }
    </style>
</head>
<body>
<div class="bg-decor d1">🐼</div>
<div class="bg-decor d2">🦊</div>
<div class="bg-decor d3">🐧</div>
<div class="bg-decor d4">🐌</div>
<div class="bg-decor d5">🌸</div>
<div class="bg-decor d6">🍎</div>
<div class="bg-decor unicorn">🦄</div>
<div class="bg-decor bear">🐻‍❄️</div>

<div class="container">
    <h1 class="title">🌈 英语期末闯关岛 🌈</h1>
    <div class="progress-bar" id="progressBar">
        <div class="progress-dot active" id="dot1">1</div>
        <div class="progress-connector" id="conn1"></div>
        <div class="progress-dot inactive" id="dot2">2</div>
        <div class="progress-connector" id="conn2"></div>
        <div class="progress-dot inactive" id="dot3">3</div>
    </div>
    <div style="text-align:center"><div class="level-info" id="levelText">🐣 第 1 关：中英文配对</div></div>
    <div class="score" id="score">🏆 总分：0 分</div>

    <div class="level active" id="level1">
        <div class="level-title">🎈 气泡消消乐 · 配对挑战 🎈</div>
        <div class="bubble-container" id="bubbleBox"></div>
        <div style="text-align:center; margin-top:5px"><span style="background:#ffddbb; padding:4px 18px; border-radius:30px;">✨ 点击英语和对应中文一起消除 ✨</span></div>
    </div>
    <div class="level" id="level2">
        <div class="level-title">📦 单词分类大冒险 📦</div>
        <div class="word-pool" id="wordPool"></div>
        <div class="category-box" id="categoryBox"></div>
    </div>
    <div class="level" id="level3">
        <div class="level-title">⭐ 口语小明星 ⭐</div>
        <div id="questionBox"></div>
    </div>

    <div class="nav-buttons" id="navButtons">
        <button class="nav-btn prev" id="prevBtn" disabled>🐢 上一关</button>
        <button class="nav-btn next" id="nextBtn">下一关 🐇</button>
    </div>
    <div class="finish-box" id="finishBox">
        <div class="finish-icon">🏆🎉</div>
        <div class="finish-title">闯关成功！</div>
        <div class="finish-score" id="finalScore">0分</div>
        <div class="finish-msg" id="finishMsg"></div>
        <button class="restart-btn" id="restartBtn">🔄 重新冒险</button>
    </div>
</div>

<div class="achievement-overlay" id="achievementOverlay">
    <div class="achievement-card">
        <div class="achievement-icon" id="achievementIcon">🎉</div>
        <div class="achievement-text" id="achievementText">好厉害！</div>
        <div class="achievement-sub" id="achievementSub"></div>
        <button class="achievement-close" id="achievementClose" style="background:#fea82f; margin-top:15px;">继续闯关</button>
    </div>
</div>

<script>
    let currentLevel = 1;
    let totalScore = 0;
    let selectedBubble = null;
    let level2Initialized = false;
    let level3Initialized = false;
    let level1Completed = false;
    let level2Completed = false;
    let level3Completed = false;
    let placedWords = 0;          // 第二关已正确分类计数
    let level2TotalWords = 0;

    // 音效简单模拟（WebAudio兼容可省略不影响游戏，只做加分趣味）
    function playMatchSound() { /* 静默或简单蜂鸣无需复杂，不阻塞 */ }
    function playLevelCompleteSound() { }
    function playStarSound() { }
    function playWrongSound() { }

    function updateScore() { document.getElementById('score').innerHTML = `🏆 总分：${totalScore} 分`; }
    function updateProgress() {
        for (let i=1;i<=3;i++) {
            let dot = document.getElementById(`dot${i}`);
            dot.className = 'progress-dot';
            if (i === currentLevel) dot.classList.add('active');
            else if ((i===1 && level1Completed) || (i===2 && level2Completed) || (i===3 && level3Completed)) dot.classList.add('completed');
            else dot.classList.add('inactive');
        }
        let c1=document.getElementById('conn1'), c2=document.getElementById('conn2');
        c1.className = 'progress-connector' + (level1Completed ? ' done' : '');
        c2.className = 'progress-connector' + (level2Completed ? ' done' : '');
    }
    function showAchievement(icon, text, sub, autoClose=1800) {
        let overlay = document.getElementById('achievementOverlay');
        document.getElementById('achievementIcon').innerText = icon;
        document.getElementById('achievementText').innerText = text;
        document.getElementById('achievementSub').innerText = sub;
        overlay.classList.add('show');
        if (autoClose) setTimeout(() => overlay.classList.remove('show'), autoClose);
    }
    document.getElementById('achievementClose').onclick = () => document.getElementById('achievementOverlay').classList.remove('show');

    // 检查当前关卡是否完成，用于下一关判定
    function isCurrentLevelCompleted() {
        if (currentLevel === 1) return level1Completed;
        if (currentLevel === 2) return level2Completed;
        if (currentLevel === 3) return level3Completed;
        return false;
    }

    // 切换关卡（带有锁定逻辑：未完成不能进入下一关）
    function goToLevel(level) {
        if (level < 1 || level > 3) return;
        // 如果要进入的关卡 > currentLevel 且 当前关卡未完成 => 锁定!
        if (level > currentLevel && !isCurrentLevelCompleted()) {
            let msg = currentLevel === 1 ? "✨ 请先完成第一关的气泡配对 ✨" : "🎈 请先完成当前关卡的挑战吧！";
            showAchievement('🔒', '关卡未解锁', msg, 1500);
            return;
        }
        currentLevel = level;
        document.querySelectorAll('.level').forEach(l => l.classList.remove('active'));
        document.getElementById(`level${level}`).classList.add('active');
        let text = level === 1 ? "🐣 第 1 关：中英文配对" : (level === 2 ? "🐱 第 2 关：单词分类" : "🦄 第 3 关：口语问答");
        document.getElementById('levelText').innerHTML = text;
        if (level === 2 && !level2Initialized) { initLevel2(); level2Initialized = true; }
        if (level === 3 && !level3Initialized) { initLevel3(); level3Initialized = true; }
        updateProgress();
        updateNavButtons();
        // 额外: 若已完成关卡，禁止互动（视觉上禁用拖拽/评分/配对）
        applyLevelReadOnly(level);
    }

    // 针对已完成关卡禁用可交互元素，避免重复得分
    function applyLevelReadOnly(level) {
        if (level === 1 && level1Completed) {
            document.querySelectorAll('#bubbleBox .bubble').forEach(b => b.style.pointerEvents = 'none');
        } else if (level === 2 && level2Completed) {
            document.querySelectorAll('#level2 .drag-item').forEach(item => item.draggable = false);
            // 禁止 drop 行为通过全局标志 done
        } else if (level === 3 && level3Completed) {
            document.querySelectorAll('#level3 .star-btn').forEach(btn => btn.disabled = true);
        }
    }

    function updateNavButtons() {
        let prevBtn = document.getElementById('prevBtn'), nextBtn = document.getElementById('nextBtn');
        prevBtn.disabled = (currentLevel === 1);
        if (currentLevel === 3) {
            nextBtn.textContent = '🏁 完成测评';
            nextBtn.onclick = () => {
                if (level3Completed) {
                    showFinish();
                } else {
                    showAchievement('🌟', '还没评分呢', '请先给这道题点亮星星🌟～', 1500);
                }
            };
        } else {
            nextBtn.textContent = '下一关 🚀';
            nextBtn.onclick = () => {
                if (!isCurrentLevelCompleted()) {
                    let msg = currentLevel === 1 ? "🐣 先把所有气泡配对消除吧！" : "🐱 请把单词全部拖拽到正确分类完成挑战！";
                    showAchievement('🧸', '未完成', msg, 1500);
                    return;
                }
                goToLevel(currentLevel + 1);
            };
        }
    }

    // ========= 第一关 ==========
    const wordPairs = [
        { eng: "playground", chn: "操场" }, { eng: "colour", chn: "颜色" }, { eng: "lunch", chn: "午餐" },
        { eng: "happy", chn: "开心的" }, { eng: "weather", chn: "天气" }, { eng: "game", chn: "游戏" },
        { eng: "clothes", chn: "服装" }, { eng: "toy", chn: "玩具" }
    ];
    function initLevel1() {
        const box = document.getElementById('bubbleBox');
        box.innerHTML = '';
        let list = [];
        wordPairs.forEach(p => { list.push({ type: 'eng', text: p.eng, match: p.chn }); list.push({ type: 'chn', text: p.chn, match: p.eng }); });
        list.sort(() => Math.random() - 0.5);
        list.forEach(item => {
            let b = document.createElement('div');
            b.className = `bubble ${item.type}`;
            b.innerText = item.text;
            b.dataset.match = item.match;
            b.addEventListener('click', selectBubble);
            box.appendChild(b);
        });
    }
    function selectBubble(e) {
        if (level1Completed) return;
        let bubble = e.target;
        if (bubble.classList.contains('matched')) return;
        if (selectedBubble) {
            if (selectedBubble === bubble) { selectedBubble.classList.remove('selected'); selectedBubble = null; return; }
            if (selectedBubble.dataset.match === bubble.innerText) {
                selectedBubble.classList.add('matched'); bubble.classList.add('matched');
                totalScore += 10; updateScore(); playMatchSound();
                if (document.querySelectorAll('#bubbleBox .bubble:not(.matched)').length === 0) {
                    level1Completed = true; updateProgress(); playLevelCompleteSound();
                    showAchievement('🎉🎊', '第一关通关！', '获得魔法气泡勋章 +30🌟', 1500);
                    setTimeout(() => { goToLevel(2); }, 1500);
                }
            } else { playWrongSound(); showAchievement('😿', '配对错误', '再试试看～', 800); }
            selectedBubble.classList.remove('selected');
            selectedBubble = null;
        } else { bubble.classList.add('selected'); selectedBubble = bubble; }
    }

    // ========= 第二关 ==========
    const categories = { clothes: ["trousers","shoes","socks","hat","dress","skirt"], colours: ["yellow","red","green","blue","black"], weather: ["sunny","rainy","cloudy","windy","snowy"] };
    function initLevel2() {
        const keys = Object.keys(categories);
        let randKeys = [];
        while(randKeys.length < 2) { let r = keys[Math.floor(Math.random() * keys.length)]; if(!randKeys.includes(r)) randKeys.push(r); }
        const catBox = document.getElementById('categoryBox'), wordPool = document.getElementById('wordPool');
        catBox.innerHTML = ''; wordPool.innerHTML = '';
        let allWords = [];
        randKeys.forEach(key => {
            const div = document.createElement('div'); div.className = `category cat-${key}`;
            div.innerHTML = `<h3>🧸 ${key}</h3>`; div.dataset.category = key; catBox.appendChild(div);
            allWords = [...allWords, ...categories[key]];
        });
        allWords.sort(() => Math.random() - 0.5);
        level2TotalWords = allWords.length;
        placedWords = 0;
        allWords.forEach(word => { 
            const item = document.createElement('div'); item.className = 'drag-item'; item.draggable = true; item.textContent = word; wordPool.appendChild(item); 
        });
        enableDragDrop();
    }
    function enableDragDrop() {
        let items = document.querySelectorAll('#level2 .drag-item'), zones = document.querySelectorAll('#level2 .category');
        items.forEach(item => {
            item.removeEventListener('dragstart', dragStartHandler);
            item.removeEventListener('dragend', dragEndHandler);
            item.addEventListener('dragstart', dragStartHandler);
            item.addEventListener('dragend', dragEndHandler);
        });
        zones.forEach(zone => {
            zone.removeEventListener('dragover', dragOverHandler);
            zone.removeEventListener('dragleave', dragLeaveHandler);
            zone.removeEventListener('drop', dropHandler);
            zone.addEventListener('dragover', dragOverHandler);
            zone.addEventListener('dragleave', dragLeaveHandler);
            zone.addEventListener('drop', dropHandler);
        });
    }
    function dragStartHandler(e) { if(level2Completed) { e.preventDefault(); return false; } e.dataTransfer.setData('text/plain', e.target.textContent); e.target.style.opacity='0.5'; }
    function dragEndHandler(e) { e.target.style.opacity='1'; }
    function dragOverHandler(e) { e.preventDefault(); e.currentTarget.style.transform='scale(1.02)'; }
    function dragLeaveHandler(e) { e.currentTarget.style.transform='scale(1)'; }
    function dropHandler(e) {
        e.preventDefault(); e.currentTarget.style.transform='scale(1)';
        if(level2Completed) return;
        let word = e.dataTransfer.getData('text/plain');
        let catName = e.currentTarget.dataset.category;
        if(!catName) return;
        if(categories[catName] && categories[catName].includes(word)) {
            let draggedElement = [...document.querySelectorAll('#level2 .drag-item')].find(el => el.textContent === word && el.parentNode.classList.contains('word-pool'));
            if(draggedElement && !e.currentTarget.contains(draggedElement)) {
                e.currentTarget.appendChild(draggedElement);
                draggedElement.style.background = '#b6e2cf';
                draggedElement.style.boxShadow = 'none';
                draggedElement.draggable = false;
                totalScore += 5; updateScore(); placedWords++; playMatchSound();
                if(placedWords === level2TotalWords) {
                    level2Completed = true; updateProgress(); playLevelCompleteSound();
                    showAchievement('🏷️', '分类大师', '单词分类完美！ +额外20分', 1500);
                    setTimeout(() => { goToLevel(3); }, 1500);
                }
            }
        } else { playWrongSound(); showAchievement('🤔', '分类错误', `${word} 不属于这个类别哦`, 1000); }
    }

    // ========= 第三关 ==========
    const questionsBank = [
        { q: "How are you today?", tip: "⭐ 回答范例：I'm fine, thanks. / I'm happy. / I'm great!" },
        { q: "What colour is the sun?", tip: "⭐ 回答范例：The sun is yellow. / It's yellow!" },
        { q: "What do you like for lunch?", tip: "⭐ 回答范例：I like rice and chicken. / I like noodles." }
    ];
    let currentCardRated = false;
    function initLevel3() {
        const container = document.getElementById('questionBox');
        container.innerHTML = '';
        const randomIndex = Math.floor(Math.random() * questionsBank.length);
        let qData = questionsBank[randomIndex];
        currentCardRated = false;
        const quizArea = document.createElement('div'); quizArea.className = 'quiz-area';
        quizArea.innerHTML = `
            <div class="card-display">
                <div class="card-question">❓ ${qData.q}</div>
                <div class="card-tip">📖 ${qData.tip}</div>
                <div class="stars-area" id="starsArea">
                    <button class="star-btn" data-stars="1">⭐</button>
                    <button class="star-btn" data-stars="2">⭐</button>
                    <button class="star-btn" data-stars="3">⭐</button>
                </div>
                <div class="score-hint" id="hintMsg">✨ 大声说出答案，然后给星星评分 ✨</div>
            </div>
        `;
        container.appendChild(quizArea);
        const stars = document.querySelectorAll('#starsArea .star-btn');
        stars.forEach(btn => {
            btn.onclick = (e) => {
                if(level3Completed || currentCardRated) { showAchievement('⛔', '已完成', '这一关已经评过分啦', 1200); return; }
                let starVal = parseInt(btn.dataset.stars);
                rateSingle(starVal);
            };
        });
    }
    function rateSingle(starCount) {
        if(currentCardRated) return;
        starsLit(starCount);
        let points = starCount * 10;
        totalScore += points; updateScore(); 
        currentCardRated = true; level3Completed = true;
        updateProgress(); playStarSound();
        document.getElementById('hintMsg').innerHTML = `⭐ 获得 ${starCount} 颗星 +${points}分！ 英语小达人！⭐`;
        showAchievement('🎤', '口语之星', `获得${starCount}星评价，真棒!`, 1600);
        setTimeout(() => { showFinish(); }, 1600);
    }
    function starsLit(count) {
        let btns = document.querySelectorAll('#starsArea .star-btn');
        btns.forEach((btn, idx) => { if(idx < count) btn.classList.add('lit'); else btn.classList.remove('lit'); });
    }
    function showFinish() {
        if(document.getElementById('finishBox').classList.contains('show')) return;
        document.getElementById('navButtons').style.display = 'none';
        document.querySelectorAll('.level').forEach(l => l.classList.remove('active'));
        document.getElementById('levelText').style.display = 'none';
        document.getElementById('progressBar').style.display = 'none';
        document.getElementById('finalScore').innerHTML = totalScore + ' 分';
        let msg = totalScore >= 100 ? '🏅 英语冒险王！彩虹奖章属于你！' : (totalScore>=70 ? '🎈 超级优秀！继续英语大冒险吧' : '📚 再加把油，下次就是满分英雄！');
        document.getElementById('finishMsg').innerText = msg;
        document.getElementById('finishBox').classList.add('show');
    }
    document.getElementById('restartBtn').onclick = () => {
        totalScore = 0; currentLevel = 1; selectedBubble = null; level2Initialized = false; level3Initialized = false;
        level1Completed = false; level2Completed = false; level3Completed = false; placedWords = 0;
        document.getElementById('finishBox').classList.remove('show');
        document.getElementById('navButtons').style.display = 'flex';
        document.getElementById('levelText').style.display = 'inline-block';
        document.getElementById('progressBar').style.display = 'flex';
        document.getElementById('levelText').style.display = 'block';
        updateScore();
        initLevel1();
        goToLevel(1);
    };
    document.getElementById('prevBtn').onclick = () => { if(currentLevel>1) goToLevel(currentLevel-1); };
    initLevel1();
    updateScore();
    updateProgress();
    updateNavButtons();
</script>
</body>
</html>
